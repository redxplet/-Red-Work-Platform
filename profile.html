<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تعديل الهوية العالمية | RED PRO</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --red-main: #ff1e1e; --dark-bg: #0a0a0a; --glass: rgba(255, 255, 255, 0.03); }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--dark-bg); color: white; scroll-behavior: smooth; }
        
        /* تأثيرات الزجاج الفاخرة */
        .glass-panel { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 35px; }
        
        .input-pro {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid transparent;
            border-radius: 20px;
            padding: 18px;
            width: 100%;
            color: white;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .input-pro:focus { border-color: var(--red-main); background: rgba(255, 255, 255, 0.08); outline: none; box-shadow: 0 0 20px rgba(255, 30, 30, 0.1); }

        /* التاجات الملونة للغات */
        .lang-tag {
            display: inline-flex; align-items: center; padding: 12px 20px;
            background: rgba(255, 255, 255, 0.05); border-radius: 15px;
            cursor: pointer; font-weight: 700; transition: 0.3s;
        }
        .lang-tag:has(input:checked) { background: var(--red-main); transform: scale(1.05); }
        .lang-tag input { display: none; }

        .btn-glow {
            background: linear-gradient(135deg, #ff1e1e 0%, #990000 100%);
            box-shadow: 0 15px 40px rgba(255, 30, 30, 0.3);
            transition: 0.4s ease;
        }
        .btn-glow:hover { transform: translateY(-5px); box-shadow: 0 25px 50px rgba(255, 30, 30, 0.5); }

        /* ستايل مخصص للسكرول بار */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: var(--red-main); border-radius: 10px; }
    </style>
</head>
<body class="p-6 md:p-12">

    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-16 gap-6">
            <div class="text-right">
                <h1 class="text-5xl font-[900] tracking-tighter italic">RED <span class="text-red-600">PRO</span></h1>
                <p class="text-gray-500 font-bold mt-2">قم ببناء ملفك الشخصي الذي سيراه العملاء في <span class="text-white">RED CLIENTS</span></p>
            </div>
            <a href="home.html" class="px-8 py-3 bg-white/5 border border-white/10 rounded-2xl font-black text-sm hover:bg-red-600 transition-all">
                <i class="fas fa-arrow-right ml-2"></i> العودة للوحة التحكم
            </a>
        </header>

        <form id="profileForm" class="grid lg:grid-cols-12 gap-10">
            
            <div class="lg:col-span-5 space-y-8">
                <div class="glass-panel p-8 md:p-10">
                    <h3 class="text-xl font-black mb-8 text-red-500 italic uppercase tracking-widest border-r-4 border-red-600 pr-4">هوية المبدع</h3>
                    
                    <div class="space-y-6">
                        <div class="text-center mb-8">
                            <div class="relative inline-block group">
                                <img id="avatarPreview" src="https://ui-avatars.com/api/?name=User&background=333&color=fff" class="w-32 h-32 rounded-[40px] object-cover border-4 border-white/5 group-hover:border-red-600 transition-all">
                                <button type="button" class="absolute bottom-0 right-0 bg-red-600 w-10 h-10 rounded-2xl flex items-center justify-center border-4 border-[#0a0a0a] hover:scale-110 transition">
                                    <i class="fas fa-camera text-sm"></i>
                                </button>
                            </div>
                        </div>

                        <div>
                            <label class="block text-[10px] font-black text-gray-500 uppercase mb-3 tracking-widest">الاسم الاحترافي</label>
                            <input type="text" id="fullName" class="input-pro" placeholder="طه المبدع">
                        </div>

                        <div>
                            <label class="block text-[10px] font-black text-gray-500 uppercase mb-3 tracking-widest">التخصص الرئيسي</label>
                            <select id="mainSkill" class="input-pro appearance-none cursor-pointer">
                                <option>Full Stack Developer</option>
                                <option>UI/UX Designer</option>
                                <option>Motion Graphics Artist</option>
                                <option>Digital Marketer</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-[10px] font-black text-gray-500 uppercase mb-3 tracking-widest">اللغات المتقنة</label>
                            <div id="langContainer" class="flex flex-wrap gap-2">
                                </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-7 space-y-8">
                <div class="glass-panel p-8 md:p-10">
                    <h3 class="text-xl font-black mb-8 text-red-500 italic uppercase tracking-widest border-r-4 border-red-600 pr-4">نبذة عن خبرتك</h3>
                    <textarea id="userBio" rows="5" class="input-pro text-lg font-medium" placeholder="اكتب شيئاً مبهراً عن مهاراتك..."></textarea>
                    
                    <div class="grid md:grid-cols-2 gap-6 mt-8">
                        <div>
                            <label class="block text-[10px] font-black text-gray-500 uppercase mb-3 tracking-widest">سعر الخدمة ($)</label>
                            <input type="number" id="hourlyRate" class="input-pro" placeholder="50.00">
                        </div>
                        <div>
                            <label class="block text-[10px] font-black text-gray-500 uppercase mb-3 tracking-widest">الوحدة</label>
                            <select id="rateUnit" class="input-pro">
                                <option>للساعة الواحدة</option>
                                <option>لكل مشروع</option>
                                <option>لكل خدمة</option>
                            </select>
                        </div>
                    </div>
                </div>

                <button type="submit" id="saveBtn" class="btn-glow w-full py-6 rounded-[30px] font-[900] text-xl italic uppercase tracking-tighter flex items-center justify-center gap-4 active:scale-95">
                    <span>اعتماد وتحديث الملف العالمي</span>
                    <i class="fas fa-check-circle text-2xl"></i>
                </button>
                
                <p class="text-center text-gray-600 text-[10px] font-black uppercase tracking-widest">RED WORK GLOBAL SYSTEM • 2026</p>
            </div>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCuoWMWT_7opd6oDd5-ATnZ36Fd07L9EU0",
            authDomain: "red-work-global.firebaseapp.com",
            projectId: "red-work-global",
            storageBucket: "red-work-global.firebasestorage.app",
            messagingSenderId: "616979540612",
            appId: "1:616979540612:web:a66d3d6412c930b9a970d1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // توليد لغات البرمجة/العمل
        const langs = ["العربية", "English", "Français", "Spanish"];
        const container = document.getElementById('langContainer');
        langs.forEach(l => {
            const label = document.createElement('label');
            label.className = "lang-tag";
            label.innerHTML = `<input type="checkbox" name="languages" value="${l}"> <span>${l}</span>`;
            container.appendChild(label);
        });

        // جلب البيانات الموجودة مسبقاً
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const docRef = doc(db, "users", user.uid);
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    document.getElementById('fullName').value = data.fullName || "";
                    document.getElementById('userBio').value = data.bio || "";
                    document.getElementById('hourlyRate').value = data.balance || "";
                    if(data.profilePic) document.getElementById('avatarPreview').src = data.profilePic;
                }
            } else {
                window.location.href = 'login.html';
            }
        });

        // حفظ البيانات
        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const user = auth.currentUser;
            const btn = document.getElementById('saveBtn');
            
            btn.innerHTML = `<i class="fas fa-spinner animate-spin"></i> جاري المزامنة...`;
            btn.disabled = true;

            const selectedLangs = Array.from(document.querySelectorAll('input[name="languages"]:checked')).map(el => el.value);

            try {
                await setDoc(doc(db, "users", user.uid), {
                    fullName: document.getElementById('fullName').value,
                    bio: document.getElementById('userBio').value,
                    balance: document.getElementById('hourlyRate').value,
                    languages: selectedLangs,
                    mainSkill: document.getElementById('mainSkill').value,
                    lastUpdate: new Date()
                }, { merge: true });

                alert("تم تحديث هويتك بنجاح!");
                window.location.href = "home.html";
            } catch (err) {
                console.error(err);
                alert("خطأ في الاتصال بقاعدة البيانات!");
                btn.disabled = false;
                btn.innerHTML = `<span>اعتماد وتحديث الملف العالمي</span> <i class="fas fa-check-circle text-2xl"></i>`;
            }
        });
    </script>
</body>
</html>
